<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Smith | Software Engineer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-onepiece">
    <div id="transition-overlay">
        <div class="rubber-punch"></div>
        <img src="strawhat_icon.png" alt="Hat" class="transition-hat">
    </div>
    <main class="page-wrap">
        <nav class="top-nav">
            <div class="brand"><img src="js_jolly_roger.png" class="jolly-roger"></div>
            <div class="nav-links">
                <a href="#adventures" class="active-nav">Adventures</a>
                <a href="#crew">The Crew</a>

            </div>
        </nav>
        <header class="hero">
            <h2 class="name">JOSHUA SMITH</h2>

        <section id="adventures">
            <h3 class="bounty-title">Adventures</h3>
            <div class="bounty-grid">
                <div class="bounty-poster">
                    <img src="luffy_portrait.png">

                </div>
            </div>
        </section>
    </main>
    <footer class="wooden-footer">
        <p>© 2026 Captain Joshua Smith. Setting course for new horizons.</p>
    </footer>
    <script src="script.js"></script>
